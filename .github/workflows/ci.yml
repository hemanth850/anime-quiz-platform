name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anime_quiz
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d anime_quiz"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anime_quiz
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 30
      SEED_ADMIN_EMAIL: admin@animequiz.local
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: admin12345

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace apps/api

      - name: Apply migrations
        run: npm run prisma:deploy --workspace apps/api

      - name: Build
        run: npm run build

      - name: API E2E
        run: npm run test:e2e --workspace apps/api
